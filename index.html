<!DOCTYPE html>
<html lang="el">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Εβδομαδιαίο Μενού</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

img{
width:100%;
max-width:900px;
height:auto;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="container">

<h1>Μενού Εβδομάδας</h1>

<img id="menuImage" src="menu1.png" alt="Menu">

</div>

<script>

async function getDate(){

try{

const response = await fetch("https://worldtimeapi.org/api/timezone/Europe/Athens");
const data = await response.json();
return new Date(data.datetime);

}catch{

return new Date();

}

}

function getMonday(date){

const day = date.getDay();
const diff = date.getDate() - day + (day === 0 ? -6 : 1);

const monday = new Date(date);
monday.setDate(diff);

return monday;

}

function firstMondayOfYear(year){

const d = new Date(year,0,1);

while(d.getDay() !== 1){
d.setDate(d.getDate()+1);
}

return d;

}

async function loadMenu(){

const today = await getDate();

const monday = getMonday(today);

const firstMonday = firstMondayOfYear(today.getFullYear());

const diff = monday - firstMonday;

const week = Math.floor(diff / (7*24*60*60*1000));

const menuNumber = (week % 5) + 1;

document.getElementById("menuImage").src = "menu" + menuNumber + ".png";

}

loadMenu();

</script>

</body>
</html>
